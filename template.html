<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GPT Image 2.0 Prompt Gallery</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0B0F1A;
    --panel: #0F1320;
    --panel-2: #131929;
    --line: rgba(255,255,255,0.08);
    --line-strong: rgba(255,255,255,0.18);
    --text: #E5E7EB;
    --muted: rgba(255,255,255,0.55);
    --dim: rgba(255,255,255,0.35);
    --accent: #A78BFA;
    --green: #86EFAC;
    --cyan: #67E8F9;
    --rose: #FDA4AF;
    --amber: #FBBF24;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  body { -webkit-font-smoothing: antialiased; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  header {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(10px);
    background: rgba(11,15,26,0.85);
    border-bottom: 1px solid var(--line);
    padding: 14px 24px;
  }
  .header-row {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    max-width: 1600px; margin: 0 auto;
  }
  h1 { font-size: 16px; margin: 0; letter-spacing: 0.04em; font-weight: 600; }
  h1 .accent { color: var(--accent); }
  .stats { font-size: 11px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
  .search {
    flex: 1; min-width: 240px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 8px 12px; color: var(--text); font-size: 14px; outline: none;
  }
  .search:focus { border-color: var(--line-strong); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; max-width: 1600px; margin: 12px auto 0; padding: 0 24px; }
  .chip {
    padding: 5px 12px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--line);
    font-size: 12px; cursor: pointer; user-select: none;
    transition: all 0.12s;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .chip:hover { border-color: var(--line-strong); }
  .chip.active {
    background: rgba(167,139,250,0.15);
    border-color: rgba(167,139,250,0.4);
    color: var(--accent);
  }
  .chip-count { color: var(--dim); margin-left: 6px; font-size: 10px; }
  .chip.active .chip-count { color: var(--accent); }

  main { max-width: 1600px; margin: 0 auto; padding: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.12s, transform 0.12s;
  }
  .card:hover { border-color: var(--line-strong); }
  .thumb {
    aspect-ratio: 1 / 1;
    background: #000 center/cover no-repeat;
    background-color: #0a0f1c;
    cursor: pointer;
    position: relative;
  }
  .thumb::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
  }
  .badge {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px;
    letter-spacing: 0.18em; text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.1);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .badge.poster { color: var(--accent); }
  .badge.portrait { color: var(--rose); }
  .badge.character { color: var(--cyan); }
  .badge.ad-creative { color: var(--amber); }
  .badge.ecommerce { color: var(--green); }
  .badge.comparison { color: #fff; }
  .badge.ui { color: #FCA5A5; }
  .case-num {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    color: white; font-size: 10px; padding: 3px 6px; border-radius: 4px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .meta { padding: 10px 12px 6px; }
  .title { font-size: 13px; font-weight: 500; line-height: 1.3; min-height: 33px; }
  .author { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .actions {
    display: flex; gap: 6px; padding: 4px 12px 12px;
    margin-top: auto;
  }
  .btn {
    flex: 1;
    padding: 6px 10px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); font-size: 11px; cursor: pointer;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: 0.05em;
    transition: all 0.12s;
  }
  .btn:hover { border-color: var(--line-strong); background: rgba(255,255,255,0.04); }
  .btn.copied { color: var(--green); border-color: rgba(134,239,172,0.4); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
    display: none; align-items: flex-start; justify-content: center;
    padding: 32px; overflow-y: auto;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--line-strong);
    border-radius: 14px; max-width: 1200px; width: 100%;
    display: grid; grid-template-columns: 1.4fr 1fr;
    overflow: hidden;
  }
  @media (max-width: 800px) {
    .modal { grid-template-columns: 1fr; }
  }
  .modal-img {
    background: #000 center/contain no-repeat;
    min-height: 400px;
  }
  .modal-content { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .modal-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-size: 11px; }
  .modal-meta .badge { position: static; background: rgba(255,255,255,0.06); }
  .modal-title { font-size: 20px; font-weight: 600; line-height: 1.3; }
  .modal-title a { color: var(--text); }
  .modal-title a:hover { color: var(--accent); }
  .modal-prompt {
    background: var(--bg); border: 1px solid var(--line);
    border-radius: 8px; padding: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px; line-height: 1.55;
    white-space: pre-wrap; word-wrap: break-word;
    max-height: 50vh; overflow-y: auto;
    color: var(--text);
  }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-actions .btn { flex: 0 0 auto; padding: 7px 14px; font-size: 12px; }
  .modal-close {
    position: absolute; top: 50px; right: 50px;
    background: var(--panel); border: 1px solid var(--line-strong);
    color: white; width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .empty {
    text-align: center; padding: 80px 20px; color: var(--muted);
    font-size: 14px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>GPT-Image-2 <span class="accent">Prompt Gallery</span></h1>
    <span class="stats" id="resultCount">— cases</span>
    <input type="text" class="search" id="search" placeholder="Search prompts, titles, authors…  (⌘K)" autocomplete="off" />
  </div>
  <div class="chips" id="chips"></div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none;">No cases match.</div>
</main>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
  <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
</div>

<script>
const CASES = __CASES_JSON__;
const CATS = ["poster","portrait","character","ad-creative","ecommerce","comparison","ui"];
let activeCat = "all";
let query = "";

const grid = document.getElementById("grid");
const empty = document.getElementById("empty");
const search = document.getElementById("search");
const chips = document.getElementById("chips");
const resultCount = document.getElementById("resultCount");

// chip rendering
function renderChips() {
  const counts = { all: CASES.length };
  for (const c of CATS) counts[c] = 0;
  for (const c of CASES) counts[c.category]++;
  const items = [["all","ALL"], ...CATS.map(c => [c, c])];
  chips.innerHTML = items.map(([key, label]) =>
    `<div class="chip ${key === activeCat ? 'active' : ''}" data-cat="${key}">
      ${label.toUpperCase()}<span class="chip-count">${counts[key]}</span>
    </div>`
  ).join("");
  for (const el of chips.querySelectorAll(".chip")) {
    el.onclick = () => { activeCat = el.dataset.cat; renderChips(); render(); };
  }
}

function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render() {
  const q = query.toLowerCase().trim();
  const list = CASES.filter(c => {
    if (activeCat !== "all" && c.category !== activeCat) return false;
    if (!q) return true;
    return c.title.toLowerCase().includes(q)
      || c.author.toLowerCase().includes(q)
      || c.prompt.toLowerCase().includes(q)
      || c.category.includes(q);
  });
  resultCount.textContent = `${list.length} cases`;
  if (list.length === 0) { grid.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  grid.innerHTML = list.map(c => `
    <div class="card">
      <div class="thumb" style="background-image:url('${c.image}')" onclick="openModal('${c.id}')">
        <span class="badge ${c.category}">${c.category}</span>
        <span class="case-num">#${c.num}</span>
      </div>
      <div class="meta">
        <div class="title">${escapeHtml(c.title)}</div>
        <div class="author">${c.author ? '@' + escapeHtml(c.author) : ''}</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="copyPrompt('${c.id}', this)">copy prompt</button>
        <button class="btn" onclick="openModal('${c.id}')">view</button>
      </div>
    </div>
  `).join("");
}

function copyPrompt(id, btn) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  navigator.clipboard.writeText(c.prompt).then(() => {
    const orig = btn.textContent;
    btn.textContent = "✓ copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1400);
  });
}

function openModal(id) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <div class="modal-img" style="background-image:url('${c.image}')"></div>
    <div class="modal-content">
      <div class="modal-meta">
        <span class="badge ${c.category}">${c.category}</span>
        <span class="mono" style="color:var(--muted);">#${c.num}</span>
        ${c.author ? `<span class="mono" style="color:var(--muted);">by <a href="${c.author_url}" target="_blank" rel="noopener">@${escapeHtml(c.author)}</a></span>` : ''}
      </div>
      <div class="modal-title">${c.source_url ? `<a href="${c.source_url}" target="_blank" rel="noopener">${escapeHtml(c.title)} ↗</a>` : escapeHtml(c.title)}</div>
      <div class="modal-actions">
        <button class="btn" onclick="copyPrompt('${c.id}', this)">copy prompt</button>
        <a class="btn" href="${c.image}" target="_blank" rel="noopener" style="text-decoration:none;text-align:center;">open image ↗</a>
      </div>
      <div class="modal-prompt">${escapeHtml(c.prompt)}</div>
    </div>
  `;
  document.getElementById("modalBg").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e && e.target.closest("#modal") && !e.target.closest(".modal-close")) return;
  document.getElementById("modalBg").classList.remove("open");
  document.body.style.overflow = "";
}

// Search
search.addEventListener("input", e => { query = e.target.value; render(); });

// Hotkeys
window.addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
    e.preventDefault(); search.focus(); search.select();
  } else if (e.key === "Escape") {
    if (document.getElementById("modalBg").classList.contains("open")) closeModal();
    else if (document.activeElement === search) search.blur();
  } else if (e.key === "/" && document.activeElement !== search) {
    e.preventDefault(); search.focus();
  }
});

renderChips();
render();
</script>
</body>
</html>
